[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.20"
evm_version = "london"
optimizer = true
optimizer_runs = 200
via_ir = true

fuzz = { runs = 256 }


[fmt]
line_length = 120
tab_width = 4
bracket_spacing = true
int_types = "long"

[rpc_endpoints]
bittensor = "${BITTENSOR_RPC_URL}"
bittensor_testnet = "${BITTENSOR_TESTNET_RPC_URL}"

[etherscan.bittensor]
chain = 8299
url = "https://evm.taostats.io/api/"
key = "${BITTENSOR_API_KEY}"
